<!DOCTYPE html>
<html lang="id">
    <head>
            <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>AI Commercial Shot Sheet</title>

                        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="container">

                <h1>AI Commercial Shot Sheet</h1>
                    <p>Upload foto produk untuk membuat AI Commercial Shot Sheet.</p>

                        <div class="card">

                                    <label>Upload Product</label>
                                            <input type="file" id="imageInput" accept="image/*"> 
<div id="preview"></div>
                                                    <br><br>
                                       
                                                            <label>Kategori</label>

                                                                    <select id="category">
                                                                                    <option>Skincare</option>
                                                                                                <option>Tas</option>
                                                                                                            <option>Hijab</option>
                                                                                                                        <option>Sandal</option>
                                                                                                                                    <option>Sepatu</option>
                                                                                                                                                <option>Parfum</option>
                                                                    </select>

                                                                            <br><br>

                                                                                    <button id="generateBtn">
                                                                                                    Generate Shot Sheet
                                                                                    </button>

                                                                                </div>

                                                                                    <div id="result">

                                                                                                <h2>Hasil AI</h2>

                                                                                                        <div id="output">
                                                                                                                        Belum ada hasil.
                                                                                                        </div>

                                                                                                    </div>

                                                                                                </div>

                                                                                                <script src="script.js"></script>

                                                                                            </body>
                                                                                            </html>
